{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Jotly{% endblock %}</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/diary_styles.css' %}" rel="stylesheet">
</head>
<body>

<!-- Хэдер -->
<header class="bg-primary text-white py-3 shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <h1 class="h4 mb-0">Jotly</h1>
    </div>
</header>


<!-- Основной контент -->
<main class="main-content">
    {% block content %}
    {% endblock %}
</main>

<!-- Футер -->
<footer class="bg-light text-center text-muted py-3 mt-5 border-top">
    <small>© 2025 Jotly — все права защищены.</small>
</footer>

<!-- Скрипты -->
<script src="{% static 'js/diary_scripts.js' %}"></script>
</body>
</html>
